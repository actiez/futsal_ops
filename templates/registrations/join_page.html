{% extends "base.html" %}

{% block title %}Join Event{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white p-6 rounded-2xl shadow">
        <h1 class="text-2xl font-bold mb-4">Join Event</h1>

        <p><strong>Date:</strong> {{ event.weekday_display }}, {{ event.date_display }}</p>
        <p><strong>Time:</strong> {{ event.time_range_display }}</p>
        <p><strong>Location:</strong> {{ event.location }}</p>
        <p><strong>Price:</strong> ${{ event.amount_payable }}</p>

        <form method="post" class="mt-6">
            {% csrf_token %}
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700">
                Confirm Join
            </button>
        </form>
    </div>
</div>
{% endblock %}
