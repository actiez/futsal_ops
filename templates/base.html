<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Futsal Ops{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-gray-900">Futsal Ops</a>

            <div class="flex items-center gap-4">
                {% if request.user.is_authenticated %}
                    <span class="text-sm text-gray-600">{{ request.user.username }}</span>

                    <form method="post" action="/logout/">
                        {% csrf_token %}
                        <button type="submit" class="text-sm px-4 py-2 rounded-xl bg-red-600 text-white hover:bg-red-700">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="/login/" class="text-sm px-4 py-2 rounded-xl bg-blue-600 text-white hover:bg-blue-700">
                        Login
                    </a>
                {% endif %}
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="px-4 py-3 rounded-xl bg-gray-100 text-gray-700 text-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
