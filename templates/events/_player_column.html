<div class="bg-white p-4 rounded-2xl shadow">
    <h2 class="font-semibold mb-3">{{ title }} ({{ players|length }})</h2>

    <div class="space-y-2">
        {% for reg in players %}
        <div class="flex justify-between items-center bg-gray-50 p-2 rounded-xl gap-3">

            <div>
                <div class="text-sm font-medium">
                    {{ reg.user.get_full_name|default:reg.user.username }}
                </div>

                <div class="text-xs mt-1 px-2 py-0.5 rounded-full inline-block
                    {% if reg.user.player_type == 'core' %}
                        bg-green-100 text-green-700
                    {% elif reg.user.player_type == 'regular' %}
                        bg-blue-100 text-blue-700
                    {% elif reg.user.player_type == 'new' %}
                        bg-gray-100 text-gray-700
                    {% else %}
                        bg-red-100 text-red-700
                    {% endif %}
                ">
                    {{ reg.user.player_type }}
                </div>
            </div>

            <div class="flex gap-1 flex-wrap justify-end">
                <form method="post" action="{% url 'registration_move' reg.id 'playing' %}">
                    {% csrf_token %}
                    <button type="submit" class="text-xs px-2 py-1 bg-green-100 rounded">
                        P
                    </button>
                </form>

                <form method="post" action="{% url 'registration_move' reg.id 'waiting' %}">
                    {% csrf_token %}
                    <button type="submit" class="text-xs px-2 py-1 bg-yellow-100 rounded">
                        W
                    </button>
                </form>

                <form method="post" action="{% url 'registration_move' reg.id 'backup' %}">
                    {% csrf_token %}
                    <button type="submit" class="text-xs px-2 py-1 bg-red-100 rounded">
                        B
                    </button>
                </form>

                <form method="post" action="{% url 'registration_move' reg.id 'interested' %}">
                    {% csrf_token %}
                    <button type="submit" class="text-xs px-2 py-1 bg-gray-200 rounded">
                        I
                    </button>
                </form>

		<form method="post" action="{% url 'registration_delete' reg.id %}">
		    {% csrf_token %}
		  <button type="submit"
    			onclick="return confirm('Kick this player?')"
    			class="text-xs px-2 py-1 bg-red-100 rounded">
    			X
		</button>
		</form>

            </div>

        </div>
        {% empty %}
        <div class="text-xs text-gray-400">Empty</div>
        {% endfor %}
    </div>
</div>
